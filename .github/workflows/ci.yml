name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: CLI Typecheck
        run: pnpm -C cli typecheck

      - name: CLI Test
        run: pnpm -C cli test

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Schema drift check (nanoka + drizzle)
        run: |
          pnpm db:generate
          if [ -n "$(git status --porcelain -- drizzle)" ]; then
            echo "::error::drizzle/ is out of date. Run 'pnpm db:generate' and commit the result."
            git status --porcelain -- drizzle
            git --no-pager diff -- drizzle
            exit 1
          fi
